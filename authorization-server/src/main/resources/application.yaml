spring:
  application:
    name: authorization-server
  datasource:
    url: jdbc:h2:mem:login_app;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-consoles

server:
  port: 9090

logging:
  level:
    org:
      springframework:
        security: TRACE

